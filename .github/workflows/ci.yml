name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: ./build.sh release

      - name: Self-test
        # The overlay is driven with real key events, so it needs a window
        # server session — the default runner has one.
        run: ./run-tests.sh
